spring.application.name=backend

# --- JWT ---
app.jwt.secret=${JWT_SECRET:pixsub-local-dev-secret-key-must-be-at-least-32-chars}
app.jwt.expiration-hours=24

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/pixsub
spring.datasource.username=pixsub
spring.datasource.password=pixsub
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
