spring.application.name=backend

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=pix-subscriptions
info.app.version=@project.version@

# --- Tracing (OpenTelemetry) ---
# Set OTEL_EXPORTER_OTLP_ENDPOINT env var to your collector (e.g. http://localhost:4318)
# Sampling rate: 1.0 = 100% in dev, lower in prod
management.tracing.sampling.probability=1.0
spring.application.name=pix-subscriptions

# --- OpenAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- JWT ---
app.jwt.secret=${JWT_SECRET:pixsub-local-dev-secret-key-must-be-at-least-32-chars}
app.jwt.expiration-hours=24

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/pixsub
spring.datasource.username=pixsub
spring.datasource.password=pixsub
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
