services:
  db:
    image: postgres:16-alpine
    container_name: pixsub-postgres
    environment:
      POSTGRES_DB: pixsub
      POSTGRES_USER: pixsub
      POSTGRES_PASSWORD: pixsub
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixsub -d pixsub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dbdata:
